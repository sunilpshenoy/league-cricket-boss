nder:"neutral",thumb:"\u{1F9E1}"}};function Ly(e,t,n,l,i,o){let r=di[e]||di.DC,u=t||1,d=M[e],f=d?.name||e,c=d?.short||e,g="neutral";i?g="celebratory":u>1&&!l?g=u===3?"cold":"urgent":u>1&&l&&(g="warm");let h={corporate:{year1:{opening:"Welcome, Coach. We don't do sentiment here \u2014 we do results.",body:`${f} has the resources, the squad depth, and the infrastructure to compete for the title. We expect you to use them. The minimum bar is a playoff qualification. Anything below that will be reviewed.`,closing:"We back our coaches fully \u2014 as long as the numbers stack up. Good luck.",tone:"neutral"},year2_good:{opening:"The board has noted last season's performance with approval.",body:"You've built trust. Now we expect you to build on it. A playoff finish is no longer a target \u2014 it is the floor. The title is the ceiling. The squad you build at auction must reflect that ambition.",closing:"Keep the standards high. We're watching.",tone:"warm"},year2_bad:{opening:"Coach, the board met last week. The conversation was not comfortable.",body:`Missing the playoffs is not something ${f} budgets for. We have invested heavily in this squad and in your vision. We need to see that investment reflected on the points table. This season is critical.`,closing:"We are not in the habit of making the same mistake twice.",tone:"urgent"},year3_good:{opening:"Two seasons in, the board is satisfied \u2014 but satisfaction is not celebration.",body:"You have one final season on this contract. The expectation is simple: a title or a final. We do not hand out extensions for near-misses.",closing:"Deliver, and this is just the beginning of a longer conversation.",tone:"neutral"},year3_bad:{opening:"Coach, I will be direct. This is your last season on this contract.",body:"The numbers have not justified the faith we placed in you. We need the playoffs at minimum \u2014 a title would be transformative. Without either, we will be forced to make changes going into the next cycle.",closing:"Go into that auction room and build something worthy. Are you ready?",tone:"cold"}},patriarch:{year1:{opening:`Coach, welcome to ${f}. We do things differently here.`,body:`This is a family. The players know that. The fans know that. We expect you to learn that too. ${f} has won ${o} title${o!==1?"s":""} because we never panic, never rebuild needlessly, and never stop believing. That philosophy is not optional \u2014 it is the job.`,closing:"Win with grace. The rest will follow.",tone:"warm"},year2_good:{opening:`I told the board at the start of last season that you understood ${f}'s way. You proved me right.`,body:"This year the expectation is the same \u2014 calm, consistent, clinical. No heroics needed. Build a squad that respects the jersey. Now make them champions.",closing:"I back you completely. Don't make me regret it.",tone:"warm"},year2_bad:{opening:"I won't pretend last season was acceptable. It wasn't.",body:`${f} does not miss playoffs. Not in our culture, not with our resources, not with our history. Something broke last year. I need you to find it and fix it before the first ball is bowled.`,closing:"I still believe in you. But even my patience has limits.",tone:"urgent"},year3_good:{opening:"Two strong seasons. The board is pleased, and so am I.",body:`One last push. ${f} deserves another title \u2014 the fans deserve it, the players deserve it. Go get it.`,closing:"Make it count, Coach.",tone:"celebratory"},year3_bad:{opening:"We need to talk honestly, coach to chairman.",body:`This is the final year of your contract, and the position is not comfortable. ${f} has a legacy that demands playoffs every season. We haven't had that from you yet. I need it this year.`,closing:"Prove the doubters wrong. Including me.",tone:"cold"}},desperate:{year1:{opening:"This. Is. The. Year.",body:`I know every coach hears that. But I mean it differently. ${f} has come so close so many times. Build the squad right this time. Get the stars in. The fans have waited long enough. We are not here to compete \u2014 we are here to win.`,closing:"Don't let us down. We believe in you completely.",tone:"urgent"},year2_good:{opening:"Last season gave us hope. Real hope. Not the hollow kind.",body:"Now we need to convert that hope. The playoff run showed what this team is capable of. This season, good is not good enough. We go all the way or we go home.",closing:"The fans are with you. The board is with you. Go.",tone:"warm"},year2_bad:{opening:"I told the board you were the right person. Please don't make me wrong.",body:"Missing the playoffs was painful. More painful than I can express in a professional setting. We have the players \u2014 if you pick them right. Something needs to change. Tactically, mentally, something. Start in that auction room.",closing:`We're running out of seasons to say "next year."`,tone:"urgent"},year3_good:{opening:"Two seasons of progress. The tide is turning.",body:"This is your contract year. This is our window. We have the players, we have momentum, and we have a fanbase that has been waiting their entire lives for this. Don't let the moment pass.",closing:"Win it for them. Win it for us.",tone:"celebratory"},year3_bad:{opening:"I'm going to be brutally honest because we have no time for anything else.",body:"Two seasons without a playoff finish is a crisis. I have defended you to people who wanted you gone after year one. That goodwill has been spent. This season, playoff minimum \u2014 title preferred. There is no middle ground.",closing:"This is not a threat. This is a reality.",tone:"cold"}},showman:{year1:{opening:"My friend, welcome to the greatest show in cricket.",body:`${f} is not just a team \u2014 it is an emotion. Forty million fans don't just watch us play, they feel every ball. When we win, they win. When we lose, I feel it personally. We've won three titles and every time it felt like the first time. I want that feeling again.`,closing:"Make them believe. Make me believe. Let's go make history.",tone:"warm"},year2_good:{opening:"Last season you gave the fans something to cheer about. I was cheering too.",body:`Now I want them on their feet for the entire tournament. ${f} wins with style, with passion, with heart. More of that this year. More of everything.`,closing:"Dream big, coach. We dream big here.",tone:"celebratory"},year2_bad:{opening:"I have to be honest \u2014 last season broke my heart a little.",body:`Not because we didn't win \u2014 we've lost before. But because we didn't fight the way ${f} teams fight. I need that hunger back. Every player, every match, every ball. That is what this franchise stands for.`,closing:"Bring the fire back. The rest will take care of itself.",tone:"urgent"},year3_good:{opening:"Two seasons. One more to write the story the right way.",body:"A third title would make you a legend at this club. Alongside the players, alongside the coaches who came before. That is what I am offering you \u2014 a place in this club's history.",closing:"Go earn it.",tone:"celebratory"},year3_bad:{opening:"My friend, I say this with genuine affection \u2014 this has to be different.",body:"I have believed in you, I have backed you publicly and privately. But two seasons without a playoff finish is something I cannot defend to forty million people. This year, we fight for glory \u2014 or we part as friends who gave it our best shot.",closing:"Either way, I respect you. But I need this.",tone:"cold"}},builder:{year1:{opening:"Coach, we don't believe in shortcuts here.",body:`${f} was built on process \u2014 squad depth, system cricket, marginal gains. That philosophy won us a title and it will win us more. We don't want flash. We want consistency, discipline, and a team that peaks in May. Build the system, and results will follow.`,closing:"We're patient people. But we expect the process to show.",tone:"neutral"},year2_good:{opening:"The process is working. That's all we needed to see.",body:"Last season confirmed that the system you've built is sound. Now let's sharpen it. We want to see the team playing their best cricket in the knockouts, not just the league stage.",closing:"Build on it. Don't change what works.",tone:"warm"},year2_bad:{opening:"Let's look at the data from last season without sentiment.",body:"The system broke down at key moments. Whether that's selection, tactics, or preparation \u2014 something needs to be reviewed. We trust your process, but a process that doesn't produce results needs to evolve.",closing:"Fix it before the tournament starts, not during it.",tone:"urgent"},year3_good:{opening:"Two seasons of solid results. The foundation is strong.",body:"This is the season to build the penthouse. Playoffs are expected. A title run is the goal. Build on the experience you've accumulated \u2014 use it wisely in the auction.",closing:"Peak when it matters most.",tone:"neutral"},year3_bad:{opening:"At the end of this season, we review everything.",body:"Two cycles without playoffs is a structural problem, not a luck problem. We need a top-four finish as the minimum outcome. If the process still isn't delivering by May, we will need to reconsider the process.",closing:"Results matter. They always do.",tone:"cold"}},ambitious:{year1:{opening:"Coach, we are a young franchise with old ambitions.",body:`${f} was built to be a title contender fast. We don't have decades of legacy \u2014 we have resources, hunger, and no ceiling. Every player on this squad was selected to win, not to participate. We want playoffs minimum, a title as the dream.`,closing:"Show this league that new blood can win it all.",tone:"neutral"},year2_good:{opening:"Last season proved we belong at the top table.",body:"The league noticed us. The other coaches are preparing differently because of how we played. That's the reputation we want \u2014 dangerous, ambitious, relentless. More of that this year. Turn respect into trophies.",closing:"We're just getting started.",tone:"warm"},year2_bad:{opening:"We haven't
